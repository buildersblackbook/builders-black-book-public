<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="160" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background. Add white rect if needed for preview. -->

  <!-- Centered Icon: Book -->
  <g id="book-icon" transform="translate(60, 8)">
    <!-- Main book cover -->
    <rect x="0" y="0" width="80" height="72" rx="4" fill="#1a365d"/>
    <!-- Spine -->
    <rect x="0" y="0" width="11" height="72" fill="#0f172a"/>
    <!-- Inner pages -->
    <rect x="15" y="6" width="58" height="60" rx="2" fill="#f8fafc"/>
    
    <!-- Blueprint grid -->
    <g stroke="#1a365d" stroke-width="1.1" opacity="0.2">
      <line x1="19" y1="14" x2="68" y2="14"/>
      <line x1="19" y1="23" x2="68" y2="23"/>
      <line x1="19" y1="32" x2="68" y2="32"/>
      <line x1="19" y1="41" x2="68" y2="41"/>
      <line x1="19" y1="50" x2="68" y2="50"/>
      <line x1="28" y1="9" x2="28" y2="62"/>
      <line x1="40" y1="9" x2="40" y2="62"/>
      <line x1="53" y1="9" x2="53" y2="62"/>
    </g>

    <!-- Roof accent -->
    <polygon points="24,9 40,0 56,9" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="24" y1="9" x2="56" y2="9" stroke="#d97706" stroke-width="1.2" opacity="0.55"/>
  </g>

  <!-- Stacked Text -->
  <text 
    x="100" 
    y="105" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
    font-size="19" 
    font-weight="600" 
    fill="#1a365d" 
    text-anchor="middle"
    letter-spacing="-0.3">Builder's</text>

  <text 
    x="100" 
    y="132" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" 
    font-size="21" 
    font-weight="800" 
    fill="#0f172a" 
    text-anchor="middle"
    letter-spacing="1.8">BLACK BOOK</text>
</svg>
